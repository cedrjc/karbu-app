name: Build TWA AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
        
      - name: Init TWA
        run: bubblewrap init --manifest=https://cedrjc.github.io/karbu-app/manifest.json
        
      - name: Build AAB
        run: bubblewrap build --skipPwaValidation
        
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: karbu-aab
          path: '*/.aab'
